<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pendaftaran - Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container section-padding">
        <div class="card p-5 mx-auto" style="max-width: 600px;">
            <h2 class="text-center mb-4">Form Anggota Baru</h2>
            <form id="memberForm">
                <div class="mb-3">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" id="name" class="form-control" placeholder="Masukkan nama..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="nama@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Bidang Minat</label>
                    <select id="interest" class="form-select" required>
                        <option value="">-- Pilih Bidang --</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Cyber Security">Cyber Security</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Kirim Data</button>
            </form>

            <div id="resultDisplay" class="mt-4 p-3 rounded d-none">
                <h6 class="fw-bold">Hasil Input (Simulasi Array):</h6>
                <p id="outputInfo" class="small mb-0"></p>
            </div>
            
            <div class="text-center mt-4">
                <a href="./index.html" class="text-decoration-none"> Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script>
        // Array simulasi penyimpanan sesuai requirement
        const membersArray = [];

        document.getElementById('memberForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const member = {
                nama: document.getElementById('name').value,
                email: document.getElementById('email').value,
                minat: document.getElementById('interest').value
            };

            // Simpan ke array
            membersArray.push(member);

            // Alert interaksi dasar
            alert("Data Berhasil Ditambahkan ke Array!");

            // Menampilkan hasil di bawah form
            const resultDiv = document.getElementById('resultDisplay');
            resultDiv.classList.remove('d-none');
            document.getElementById('outputInfo').innerText = 
                `Nama: ${member.nama} | Email: ${member.email} | Bidang: ${member.minat}`;
            
            console.log("Isi Array Saat Ini:", membersArray);
            this.reset();
        });
    </script>
</body>
</html>
