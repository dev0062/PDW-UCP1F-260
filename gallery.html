<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tech Community - Multimedia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-center">
    <div class="container mt-5">
        <h1>Gallery Multimedia</h1>
        <nav class="mb-4">
            <a href="./index.html" class="btn btn-sm btn-outline-dark">Beranda</a>
        </nav>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <img id="mainImage" src="https://picsum.photos/300/200" class="img-fluid rounded" alt="Tech">
                    <button class="btn btn-warning mt-2" onclick="changeImage()">Ganti Gambar</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <iframe width="100%" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
                    <p class="mt-2">Dokumentasi Komunitas</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h5>Podcast Tech</h5>
                    <audio id="techAudio" class="w-100 mb-2">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                    </audio>
                    <div class="btn-group">
                        <button class="btn btn-success" onclick="document.getElementById('techAudio').play()">Play</button>
                        <button class="btn btn-danger" onclick="document.getElementById('techAudio').pause()">Stop</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Interaksi sederhana JavaScript 
        function changeImage() {
            const img = document.getElementById('mainImage');
            img.src = "https://picsum.photos/300/200?random=" + Math.random();
            alert("Gambar telah diperbarui!");
        }
    </script>
</body>
</html>
