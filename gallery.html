<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Multimedia - Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="text-center">
    <div class="container section-padding">
        <h2 class="mb-5 fw-bold">Konten Multimedia</h2>
        <a href="./index.html" class="btn btn-outline-secondary mb-5 btn-sm">← Kembali</a>

        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <div class="card h-100 p-3">
                    <img id="galleryImg" src="https://picsum.photos/400/250?tech" class="img-fluid rounded" alt="Tech Image">
                    <button class="btn btn-sm btn-warning mt-3" onclick="changeImage()">Ganti Gambar</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 p-3">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video" allowfullscreen></iframe>
                    </div>
                    <p class="mt-2 small text-muted">Video Tutorial Komunitas</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 p-3">
                    <h5 class="mb-3">Podcast Community</h5>
                    <audio id="myAudio">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                    </audio>
                    <div class="d-grid gap-2">
                        <button class="btn btn-success" onclick="controlAudio('play')">Putar Audio</button>
                        <button class="btn btn-danger" onclick="controlAudio('stop')">Hentikan</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeImage() {
            const img = document.getElementById('galleryImg');
            img.src = `https://picsum.photos/400/250?random=${Math.random()}`;
            alert("Gambar berhasil diganti menggunakan JavaScript!");
        }

        function controlAudio(action) {
            const audio = document.getElementById('myAudio');
            if(action === 'play') {
                audio.play();
            } else {
                audio.pause();
                audio.currentTime = 0;
            }
        }
    </script>
</body>
</html>
